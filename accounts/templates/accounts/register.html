{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register — Library System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 mt-4">
            <h4 class="mb-1"><i class="bi bi-person-plus me-2"></i>Create Account</h4>
            <p class="text-muted mb-4">Register as a new student member</p>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-success w-100 mt-2">
                    <i class="bi bi-check-circle me-2"></i>Create Account
                </button>
            </form>
            <hr>
            <p class="text-center mb-0">
                Already have an account?
                <a href="{% url 'accounts:login' %}">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
