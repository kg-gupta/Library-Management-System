{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login — Library System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 mt-4">
            <h4 class="mb-1"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h4>
            <p class="text-muted mb-4">Sign in to your library account</p>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>
            <hr>
            <p class="text-center mb-0">
                Don't have an account?
                <a href="{% url 'accounts:register' %}">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
