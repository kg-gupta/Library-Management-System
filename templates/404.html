{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="text-center py-5">
    <i class="bi bi-exclamation-circle text-muted"
       style="font-size:5rem;"></i>
    <h1 class="mt-3">404</h1>
    <h4 class="text-muted">Page Not Found</h4>
    <p class="text-muted">
        The page you are looking for does not exist or has been moved.
    </p>
    <a href="{% url 'books:list' %}" class="btn btn-primary mt-2">
        <i class="bi bi-house me-2"></i>Go to Homepage
    </a>
</div>
{% endblock %}
